<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A gamification app to help you create good daily habits.">
  <meta name="theme-color" content="#2563EB">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PeacePal">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PeacePal</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #F8FAFD;
      height: 100%;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #F8FAFD;
      z-index: 9999;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #D1E3FF;
      border-top-color: #2563EB;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="spinner"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('loading-screen');
      if (loader) {
        loader.style.transition = 'opacity 0.3s ease';
        loader.style.opacity = '0';
        setTimeout(function () { loader.remove(); }, 300);
      }
    });

    // Show update banner when SW updates and takes control
    if ('serviceWorker' in navigator) {
      var firstController = navigator.serviceWorker.controller;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        // Only show banner if there was already a SW (i.e. this is an update, not first install)
        if (!firstController) return;
        var isVi = navigator.language && navigator.language.startsWith('vi');
        var msgEl = document.getElementById('update-banner-msg');
        var btnEl = document.getElementById('update-banner-btn');
        if (msgEl) msgEl.textContent = isVi ? 'Có phiên bản mới' : 'New version available';
        if (btnEl) btnEl.textContent = isVi ? 'Tải lại' : 'Reload';
        var banner = document.getElementById('update-banner');
        if (banner) banner.style.display = 'flex';
      });
    }
  </script>

  <div id="update-banner" style="
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1E3A5F;
    color: #FFFFFF;
    padding: 12px 20px;
    border-radius: 12px;
    font-family: sans-serif;
    font-size: 14px;
    align-items: center;
    gap: 16px;
    z-index: 99999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    white-space: nowrap;
  ">
    <span id="update-banner-msg"></span>
    <button id="update-banner-btn" onclick="window.location.reload()" style="
      background: #2563EB;
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
    "></button>
  </div>
</body>
</html>
